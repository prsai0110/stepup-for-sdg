<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Project</title>
</head>
<body>
  <h1>Welcome to My Website</h1>

  <section id="about">
    <h2>About Us</h2>
    <p>We are a team of developers building awesome web projects using Git and HTML.</p>
  </section>

  <section id="contact">
    <h2>Contact Us</h2>
    <form>
      <label>Name:</label>
      <input type="text" name="name"><br>

      <label>Email:</label>
      <input type="email" name="email"><br>

      <label>Message:</label><br>
      <textarea name="message"></textarea><br>

      <button type="submit">Send</button>
    </form>
  </section>
</body>
</html>
